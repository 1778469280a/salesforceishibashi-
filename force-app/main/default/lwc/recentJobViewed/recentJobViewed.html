<template>
    <section class="recent-jobs-section">
        <div class="header-container">
            <div class="header-title">
                <span class="material-symbols-outlined icon-history">history</span>
                <h2 class="section-title">最近見た求人</h2>
            </div>
            <div class="header-link">
                <a href="/portal/search?tabs-8472=tab3" class="modify-condition-link">
                    もっと見る
                    <span class="material-symbols-outlined icon-chevron-forward">chevron_forward</span>
                </a>
            </div>
        </div>

        <template if:true={isLoading}>
            <div class="loading-container">
                <lightning-spinner size="small"></lightning-spinner>
            </div>
        </template>

        <template if:true={error}>
            <div class="error-container">
                <lightning-icon icon-name="utility:error" size="small"></lightning-icon>
                <span class="error-message">データの取得に失敗しました</span>
            </div>
        </template>

        <template if:true={isEmpty}>
            <div class="empty-container">
                最近閲覧した求人はありません
            </div>
        </template>

        <template if:true={hasJobs}>
            <div class="jobs-list">
                <template for:each={jobs} for:item="job">

                    <div key={job.id} class="job-card" data-id={job.id}>
                        <a href={job.url} class="job-title-link" onclick={handleLinkClick}>
                            <div class="job-card-content">
                                <div class="job-title-container">

                                    <span class="job-title">{job.position}</span>

                                </div>
                                <div class="job-meta">
                                    <lightning-icon icon-name="utility:clock" size="xx-small" class="meta-icon">
                                    </lightning-icon>
                                    <span class="meta-text">最終閲覧: {job.formattedDate}</span>
                                </div>
                            </div>
                            <span class="material-symbols-outlined icon-arrow">chevron_forward</span>
                        </a>
                    </div>

                </template>
            </div>
        </template>
    </section>
</template>
